apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: tenant-a-route
  namespace: tenant-gateway
  labels:
    tenant: tenant-a
spec:
  parentRefs:
    - name: llm-public-gateway
  hostnames:
    - tenant-a.example.local
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /v1/
      backendRefs:
        - name: tenant-policy-gateway
          port: 80
