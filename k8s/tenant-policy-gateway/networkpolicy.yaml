apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: tenant-policy-gateway-default-deny-and-allow-aibrix
  namespace: tenant-gateway
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: tenant-policy-gateway
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: tenant-gateway
      ports:
        - protocol: TCP
          port: 8080
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: aibrix-system
      ports:
        - protocol: TCP
          port: 80
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
